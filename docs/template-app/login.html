<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CodeMarket - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased">
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
        <!-- Header -->
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-[#151c2b] px-6 lg:px-10 py-3 sticky top-0 z-50">
            <div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
                <div class="size-8 flex items-center justify-center rounded-lg bg-primary text-white">
                    <span class="material-symbols-outlined text-xl">terminal</span>
                </div>
                <h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">
                    CodeMarket</h2>
            </div>
            <div class="hidden md:flex flex-1 justify-end gap-8">
                <div class="flex items-center gap-9">
                    <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors"
                        href="#">Browse</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors"
                        href="#">Sell</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors"
                        href="#">Pricing</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors"
                        href="#">About</a>
                </div>
                <div class="flex gap-2">
                    <button
                        class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-white text-sm font-bold leading-normal tracking-[0.015em] transition-colors">
                        <span class="truncate">Sign Up</span>
                    </button>
                    <button
                        class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary hover:bg-blue-700 text-white text-sm font-bold leading-normal tracking-[0.015em] transition-colors shadow-sm shadow-blue-500/30">
                        <span class="truncate">Login</span>
                    </button>
                </div>
            </div>
            <!-- Mobile Menu Icon -->
            <button class="md:hidden p-2 text-slate-900 dark:text-white">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </header>
        <!-- Main Content -->
        <main class="flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-10">
            <div
                class="w-full max-w-md bg-white dark:bg-[#151c2b] rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-black/20 border border-slate-100 dark:border-slate-800 overflow-hidden">
                <div class="p-8 sm:p-10">
                    <div class="text-center mb-8">
                        <h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-tight mb-2">
                            Welcome Back</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-base font-normal">Enter your details to access
                            your account.</p>
                    </div>
                    <!-- Form -->
                    <form action="#" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                for="email">Email</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] pointer-events-none">mail</span>
                                <input
                                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary pl-10 h-12 sm:text-sm"
                                    id="email" placeholder="name@company.com" required="" type="email" />
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <div class="flex items-center justify-between">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                    for="password">Password</label>
                                <a class="text-sm font-semibold text-primary hover:text-blue-600 dark:hover:text-blue-400"
                                    href="#">Forgot Password?</a>
                            </div>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] pointer-events-none">lock</span>
                                <input
                                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary pl-10 h-12 sm:text-sm"
                                    id="password" placeholder="••••••••" required="" type="password" />
                                <button
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                                    type="button">
                                    <span class="material-symbols-outlined text-[20px]">visibility</span>
                                </button>
                            </div>
                        </div>
                        <button
                            class="w-full flex items-center justify-center h-12 bg-primary hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-md shadow-blue-500/20 active:scale-[0.98]"
                            type="button">
                            Sign In
                        </button>
                    </form>
                    <!-- Divider -->
                    <div class="relative flex items-center py-6">
                        <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
                        <span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-medium uppercase tracking-wider">Or
                            continue with</span>
                        <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <!-- Social Login -->
                    <div class="grid grid-cols-2 gap-3">
                        <button
                            class="flex items-center justify-center gap-2 h-11 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-200 font-medium text-sm">
                            <img alt="Google" class="w-5 h-5" data-alt="Google Logo"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPg_Q0B9YIGwPh-RBgPM8G-vOXYVhFB0Rkdhd4axaPyRFzWNCaLX8ipKNIc9BABqC4In9lsAIPOrGCY3aiVZzRgE7mVpZzFZvmVyg9NmdOfFPWApxprXviIWAHmAsf6-xlFlrXXW5TNAtcKUJElGu1fVUShuRUiZBrkJ-n_mR8tT8hY8NwKfD5lHmV_sf77Xi8zylYRcueFFS4h1MjIJcNCioWGhIfByUfO0G6Yk9YBwSGfTbiUHcv2OV0T3QkKuuufA8P8vPI68I" />
                            Google
                        </button>
                        <button
                            class="flex items-center justify-center gap-2 h-11 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-200 font-medium text-sm">
                            <span class="material-symbols-outlined text-[22px]">code</span>
                            GitHub
                        </button>
                    </div>
                </div>
                <!-- Footer of Card -->
                <div
                    class="bg-slate-50 dark:bg-slate-800/50 px-8 py-5 text-center border-t border-slate-100 dark:border-slate-800">
                    <p class="text-slate-600 dark:text-slate-400 text-sm">
                        Don't have an account?
                        <a class="font-bold text-primary hover:text-blue-700 dark:hover:text-blue-400 transition-colors"
                            href="#">Sign up for free</a>
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
